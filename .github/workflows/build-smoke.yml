name: Build Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'scripts/install.sh'
      - '.github/workflows/release.yml'
      - '.github/workflows/build-smoke.yml'
      - '.bun-version'
      - 'bun.lock'

permissions:
  contents: read

jobs:
  build-linux-smoke:
    name: Build smoke (bun-linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        # build:binary follows workspace exports.default -> dist/index.js,
        # so the workspace packages need their dist/ populated first.
        run: bun run build

      - name: Build binary
        run: bun run --cwd packages/cli build:binary -- --target bun-linux-x64

      - name: Verify ELF executable
        run: |
          set -euo pipefail
          bin="packages/cli/dist/xs-linux-x64"
          test -x "$bin"
          file "$bin" | tee /tmp/file.out
          grep -q 'ELF.*executable' /tmp/file.out

      - name: Smoke test --help in minimal ubuntu container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE/packages/cli/dist:/dist:ro" \
            ubuntu:22.04 \
            /dist/xs-linux-x64 --help
